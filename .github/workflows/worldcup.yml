name: World Cup daily Slack update

on:
  schedule:
    # GitHub Actions cron runs in UTC. 07:00 UTC = 08:00 UK time during
    # British Summer Time (which covers the whole tournament).
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  post-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Post World Cup update to Slack
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python worldcup_bot.py
